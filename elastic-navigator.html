<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elastic redesign — navigator</title>
<style>
  :root{
    --black:#000;--ink:#1C1E23;--muted:#69707D;--blue:#0B64DD;--teal:#00776E;
    --surface:#F5F7FA;--line:#D8DDE4;--white:#FFF;
    --body:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--surface);color:var(--ink);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

  .nav{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:10px 18px;background:var(--white);border-bottom:1px solid var(--line);position:relative;z-index:10}
  .brand{font-weight:800;font-size:14px;letter-spacing:-0.02em;color:var(--black);margin-right:14px;white-space:nowrap}
  .brand span{color:var(--muted);font-weight:600}
  .tab{appearance:none;border:1px solid transparent;background:transparent;color:var(--muted);font-family:inherit;font-weight:700;font-size:13.5px;padding:8px 14px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .14s ease;white-space:nowrap}
  .tab:hover{color:var(--ink);background:var(--surface)}
  .tab.on{color:var(--white);background:var(--ink)}
  .tab .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .tab[data-k="hub"] .dot{background:var(--ink)}
  .tab.on[data-k="hub"] .dot{background:var(--white)}
  .tab[data-k="home"] .dot{background:var(--blue)}
  .tab[data-k="product"] .dot{background:var(--teal)}
  .spacer{flex:1 1 auto}
  .hint{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}

  .stage{flex:1 1 auto;position:relative;background:var(--white)}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--white)}
  iframe.hide{display:none}

  /* built-in hub */
  #hub{position:absolute;inset:0;overflow:auto;background:var(--white);display:none}
  #hub.show{display:block}
  .hub-inner{width:min(1080px,calc(100% - 48px));margin:0 auto;padding:64px 0 80px}
  .eyebrow{color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
  .hub-inner h1{font-size:clamp(38px,5.5vw,60px);font-weight:800;line-height:1.03;letter-spacing:-0.04em;color:var(--black);max-width:760px}
  .hub-inner .lead{max-width:640px;margin-top:20px;color:var(--muted);font-size:17px;line-height:28px}
  .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;margin-top:52px}
  .card{text-align:left;cursor:pointer;background:var(--white);border:1px solid var(--line);border-radius:16px;padding:30px;min-height:320px;display:flex;flex-direction:column;font-family:inherit;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
  .card:hover{transform:translateY(-4px);border-color:#AEB8C6;box-shadow:0 18px 50px rgba(28,30,35,.10)}
  .badge{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}
  .card.home .badge{color:var(--blue);background:#EAF2FF}
  .card.product .badge{color:var(--teal);background:#E7F5F3}
  .card h2{margin:30px 0 12px;font-size:30px;font-weight:800;line-height:36px;letter-spacing:-0.025em;color:var(--black)}
  .card p{margin:0;color:var(--muted);font-size:15px;line-height:25px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .chip{padding:6px 10px;background:var(--surface);border-radius:999px;font-size:12px;font-weight:700;color:var(--muted)}
  .go{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:28px;font-weight:700;font-size:15px;color:var(--black)}
  .arrow{width:38px;height:38px;border:1px solid var(--line);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:19px;transition:transform .16s ease,background .16s ease}
  .card:hover .arrow{transform:translateX(3px);background:var(--surface)}

  @media(max-width:720px){
    .cards{grid-template-columns:1fr}
    .hint{display:none}
    .nav{flex-wrap:wrap}
  }
</style>
</head>
<body>
  <nav class="nav">
    <span class="brand">Elastic redesign <span>/ navigator</span></span>
    <button class="tab on" data-k="hub"><span class="dot"></span>Index</button>
    <button class="tab" data-k="home"><span class="dot"></span>Homepage</button>
    <button class="tab" data-k="product"><span class="dot"></span>Product page</button>
    <span class="spacer"></span>
    <span class="hint">Each page keeps its own steps &amp; state</span>
  </nav>

  <div class="stage">
    <div id="hub" class="show">
      <div class="hub-inner">
        <p class="eyebrow">Elastic web redesign</p>
        <h1>Choose a project</h1>
        <p class="lead">Open either redesign artifact from one place. Each page keeps all of its own steps, decisions, and working state — switch anytime from the bar above.</p>
        <div class="cards">
          <button class="card home" data-k="home">
            <span class="badge">01</span>
            <h2>Homepage redesign</h2>
            <p>The full Elastic homepage project — problem, page flows, section roles, wireframes, and platform interaction.</p>
            <div class="chips"><span class="chip">Problem</span><span class="chip">Flow</span><span class="chip">Wireframe</span><span class="chip">Platform</span></div>
            <span class="go">Open homepage <span class="arrow">&#8594;</span></span>
          </button>
          <button class="card product" data-k="product">
            <span class="badge">02</span>
            <h2>Elasticsearch product page</h2>
            <p>The product-page project — the corrected Step 1 comparison and the current Step 2 product-strategy flow.</p>
            <div class="chips"><span class="chip">Problem</span><span class="chip">Page flow</span><span class="chip">Next steps</span></div>
            <span class="go">Open product page <span class="arrow">&#8594;</span></span>
          </button>
        </div>
      </div>
    </div>
    <iframe id="fr-home" class="hide" title="Homepage redesign"></iframe>
    <iframe id="fr-product" class="hide" title="Elasticsearch product page"></iframe>
  </div>

  var loaded = {};
  function b64ToStr(b64){
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++){bytes[i]=bin.charCodeAt(i);}
    return new TextDecoder("utf-8").decode(bytes);
  }
  function ensure(k){
    if(loaded[k]) return;
    var fr = document.getElementById("fr-"+k);
    fr.srcdoc = b64ToStr(DATA[k]);
    loaded[k] = true;
  }
  function show(k){
    document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("on", t.dataset.k===k);});
    var hub = document.getElementById("hub");
    hub.classList.toggle("show", k==="hub");
    ["home","product"].forEach(function(key){
      var fr = document.getElementById("fr-"+key);
      if(k===key){ ensure(key); fr.classList.remove("hide"); }
      else { fr.classList.add("hide"); }
    });
    window.scrollTo(0,0);
  }
  document.querySelectorAll("[data-k]").forEach(function(el){
    el.addEventListener("click", function(){ show(el.dataset.k); });
  });
</script>
